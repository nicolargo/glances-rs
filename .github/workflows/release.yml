name: Release

# Pushing a version tag builds a single binary per target and attaches the
# archives to the GitHub release for that tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl   # static, portable
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl  # static, ARM servers
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Cross-compiles when needed, builds --release --locked, packages a
      # tar.gz (unix) / zip (windows), and uploads it to the release.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: glances-rs
          target: ${{ matrix.target }}
          archive: glances-rs-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
