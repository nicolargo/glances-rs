name: Release

# Pushing a version tag creates a GitHub release, then builds a single
# binary per target and attaches the archives to it.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The upload action below does not create the release itself — it expects
  # one to exist for the tag. Create it first so the matrix jobs have a
  # release to attach their binaries to (otherwise they loop "release not
  # found" and fail).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl   # static, portable
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl  # static, ARM servers
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Cross-compiles when needed, builds --release --locked, packages a
      # tar.gz (unix) / zip (windows), and uploads it to the release.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: glances-rs
          target: ${{ matrix.target }}
          archive: glances-rs-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
